services:
  # Gerbang Web Server Utama (Nginx)
  webserver:
    image: nginx:alpine
    container_name: portal_nginx
    restart: always
    ports:
      - '80:80'
    volumes:
      - .:/var/www/html 
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

# # Backend (Laravel 10 + PHP 8.1 FPM)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal_backend
    restart: always
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql_db
  # Frontend (Vue 3 + Node.js 20)
  frontend:
    image: node:20-alpine
    container_name: portal_frontend
    restart: always
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"

  # Database (MySQL 8.0)
  mysql_db:
    image: mysql:8.0
    container_name: portal_db
    restart: always
    ports:
      - '3307:3306'
    environment:
      MYSQL_DATABASE: db_portal
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_portal_data:/var/lib/mysql

volumes:
  mysql_portal_data: