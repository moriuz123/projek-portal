server {
    listen 80;
    server_name localhost;
    root /var/www/html/backend/public;
    index index.php index.html;

    # =========================================================================
    # A. BAGIAN LARAVEL BACKEND
    # =========================================================================

    # 1. KHUSUS RUTE FILAMENT, API, & LIVEWIRE
    location ~ ^/(admin|api|livewire|storage) {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 2. PROSES EKSEKUSI PHP (Untuk Laravel & Livewire POST Login)
    location ~ \.php$ {
        fastcgi_pass portal_backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # 3. AMANKAN ASET STATIS KHUSUS BACKEND & FILAMENT SAJA
    # (Hanya memeriksa file di dalam folder admin/vendor/storage/css/js bawaan Laravel)
    location ~* ^/(css|js|vendor|storage|livewire)/.*\.(css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf)$ {
        expires max;
        log_not_found off;
    }

    # =========================================================================
    # B. BAGIAN FRONTEND VUE 3
    # =========================================================================

    # 4. SALURKAN SEMUA PERMINTAAN LAINNYA KE VUE 3 (Termasuk file JS/CSS milik Vue)
    location / {
        proxy_pass http://portal_frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}